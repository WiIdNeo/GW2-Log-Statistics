<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Statistics</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>Raid Statistics</h1>
        <button id="open-filter-btn" onclick="document.getElementById('modal').style.display='flex'">
            Filter öffnen
        </button>
    </header>

    <!-- ── Modal ─────────────────────────────────────────── -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h1>Filter</h1>

            <h2>Gruppe</h2>
            <select id="group-select">
                <option value="" disabled selected>---</option>
                <option value="ATSG Raid Static">ATSG Raid Static</option>
                <option value="Golem">Golem</option>
            </select>

            <h2>Encounter</h2>
            <select id="encounter-select">
                <option value="" disabled selected>---</option>
                <!-- wird dynamisch per JS befüllt, sobald eine Gruppe gewählt ist -->
            </select>

            <div id="player-filter-section" style="display:none;">
                <h2>Spieler</h2>
                <div id="player-checkboxes">
                    <!-- wird dynamisch per JS befüllt -->
                </div>
            </div>

            <div class="modal-buttons">
                <button onclick="filterAnwenden()">Anwenden</button>
                <button onclick="document.getElementById('modal').style.display='none'">Abbrechen</button>
            </div>
        </div>
    </div>

    <!-- ── Loading-Indicator ──────────────────────────────── -->
    <div id="loading" style="display:none;">Daten werden geladen…</div>

    <!-- ── Chart-Container (wird dynamisch befüllt) ───────── -->
    <div id="charts-container"></div>

    <!-- ── Scripts ───────────────────────────────────────── -->
    <script src="js/db.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/logic.js"></script>

</body>
</html>
