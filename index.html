        <div class="chart">

        <canvas>
            id="DPS_Chart" style="width:100%;max-width:700px"
        </canvas>

        <script src="../js/logic.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
        <script>
            // 1. Spielerliste (z.B. aus einer Datei geladen oder als Array)
            const spieler = ["Alice", "Bob", "Charlie"]; // <- kommt aus deiner spielerliste.txt

            const container = document.getElementById("charts-container");

            spieler.forEach((name, index) => {
            // 2. Canvas-Element dynamisch erzeugen
            const wrapper = document.createElement("div");
            const canvas = document.createElement("canvas");
            canvas.id = `chart-${index}`;
            wrapper.appendChild(canvas);
            container.appendChild(wrapper);

            // 3. Chart.js-Instanz für dieses Canvas
            new Chart(canvas, {
                type: "bar",
                data: {
                labels: ["Runde 1", "Runde 2", "Runde 3"],
                datasets: [{
                    label: name,
                    data: [/* Daten für diesen Spieler */],
                }]
                }
            });
            });
        </script>
